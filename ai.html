<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto AI Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:95%;
    max-width:750px;
    height:92vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.chat-header{
    background:orange;
    color:black;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.bot,.user{
    padding:12px 16px;
    margin:10px 0;
    border-radius:12px;
    max-width:75%;
    line-height:1.5;
    white-space:pre-wrap;
}

.bot{
    background:#2c2c54;
}

.user{
    background:orange;
    color:black;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:15px;
    background:rgba(0,0,0,0.2);
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:orange;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ffb347;
}

/* Add in style section */

.icon-btn{
    background:orange;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-right:8px;
}

.icon-btn:hover{
    background:#ffb347;
}

.input-area{
    display:flex;
    align-items:center;
    gap:8px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
🤖 Crypto AI Assistant
</div>

<div class="chat-box" id="chatBox">
<div class="bot">
Hello 👋 Ask me anything about crypto like Bitcoin, Ethereum, trading, wallets, blockchain, prices etc.
</div>
</div>

<!-- Replace input area with this upgraded version -->

<div class="input-area">

    <!-- Image Upload -->
    <label for="imageUpload" class="icon-btn">📁</label>
    <input type="file" id="imageUpload" accept="image/*" hidden onchange="uploadImage(event)">

    <!-- Voice Button -->
    <button class="icon-btn" onclick="startVoice()">🎙️</button>

    <!-- Text Input -->
    <input type="text" id="userInput" placeholder="Ask about crypto..." 
    onkeypress="if(event.key==='Enter') sendMessage()">

    <!-- Send -->
    <button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

const API_KEY = "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";

async function sendMessage() {

    const input = document.getElementById("userInput");
    const msg = input.value.trim();

    if (!msg) return;

    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `<div class="user">${msg}</div>`;
    input.value = "";

    chatBox.innerHTML += `<div class="bot" id="typing">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {

        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                temperature: 0.7,
                messages: [
                    {
                        role: "system",
                        content: `
You are a professional cryptocurrency assistant.
Only answer about crypto topics such as:
Bitcoin, Ethereum, Solana, XRP, blockchain,
trading, wallets, DeFi, NFTs, mining, staking,
crypto security, crypto prices, token analysis.

If user asks non-crypto questions say:
"I only answer cryptocurrency related questions."
                        `
                    },
                    {
                        role: "user",
                        content: msg
                    }
                ]
            })
        });

        const data = await response.json();

        document.getElementById("typing").remove();

        if (data.error) {
            chatBox.innerHTML += `<div class="bot">⚠ ${data.error.message}</div>`;
            return;
        }

        const reply = data.choices[0].message.content;

        chatBox.innerHTML += `<div class="bot">${reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {

        document.getElementById("typing").remove();

        chatBox.innerHTML += `<div class="bot">⚠ Error: ${error.message}</div>`;
    }
}

// Add below existing JS

/* ---------------- Voice Input ---------------- */

function startVoice(){

    const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice not supported in your browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event){
        document.getElementById("userInput").value =
        event.results[0][0].transcript;
    };
}

/* ---------------- Image Upload ---------------- */

function uploadImage(event){

    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        const chatBox = document.getElementById("chatBox");

        chatBox.innerHTML += `
        <div class="user">
            <img src="${e.target.result}" 
            style="max-width:220px;border-radius:10px;">
        </div>`;

        chatBox.innerHTML += `
        <div class="bot">
        📁 Image received. Ask me anything about this crypto chart, coin logo, screenshot or wallet image.
        </div>`;

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
